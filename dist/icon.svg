<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#030712"/>
  <!-- Face ring -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="9"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <!-- Major tick marks at 12, 3, 6, 9 -->
  <line x1="256" y1="51"  x2="256" y2="86"  stroke="rgba(255,255,255,0.55)" stroke-width="9"  stroke-linecap="round"/>
  <line x1="461" y1="256" x2="426" y2="256" stroke="rgba(255,255,255,0.30)" stroke-width="6"  stroke-linecap="round"/>
  <line x1="256" y1="461" x2="256" y2="426" stroke="rgba(255,255,255,0.30)" stroke-width="6"  stroke-linecap="round"/>
  <line x1="51"  y1="256" x2="86"  y2="256" stroke="rgba(255,255,255,0.30)" stroke-width="6"  stroke-linecap="round"/>
  <!-- Hour hand → ~10 o'clock (reversed feel) -->
  <line x1="256" y1="256" x2="163" y2="148" stroke="rgba(255,255,255,0.88)" stroke-width="17" stroke-linecap="round"/>
  <!-- Minute hand → ~2 o'clock -->
  <line x1="256" y1="256" x2="362" y2="148" stroke="rgba(255,255,255,0.65)" stroke-width="11" stroke-linecap="round"/>
  <!-- Second hand (accent) -->
  <line x1="256" y1="256" x2="196" y2="392" stroke="#06b6d4" stroke-width="5" stroke-linecap="round"/>
  <!-- Centre cap -->
  <circle cx="256" cy="256" r="20" fill="#06b6d4"/>
  <circle cx="256" cy="256" r="9"  fill="#030712"/>
</svg>
