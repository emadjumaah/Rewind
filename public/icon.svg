<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="sand"><circle cx="256" cy="256" r="160"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="112" fill="#030712"/>

  <!-- Face -->
  <circle cx="256" cy="256" r="190" fill="rgba(255,255,255,0.02)"/>

  <!-- Sand-glass day fill: the lower part of the face is the time that has
       already drained down. The surface line glows in the accent. -->
  <g clip-path="url(#sand)">
    <rect x="96" y="217.6" width="320" height="200" fill="#06b6d4" fill-opacity="0.16"/>
    <rect x="96" y="217.6" width="320" height="3" fill="#06b6d4" fill-opacity="0.55"/>
  </g>

  <!-- Depleting ring: faint full track + accent arc draining counter-clockwise
       from 12 o'clock. Time only runs out. -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="11"/>
  <path d="M 256.00 76.00 A 180 180 0 1 0 379.22 387.21" fill="none" stroke="#06b6d4" stroke-width="11" stroke-linecap="round"/>

  <!-- Face rim -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="6"/>

  <!-- Hands, reversed -->
  <line x1="256" y1="256" x2="171" y2="158" stroke="rgba(255,255,255,0.88)" stroke-width="17" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="350" y2="170" stroke="rgba(255,255,255,0.60)" stroke-width="11" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="200" y2="372" stroke="#06b6d4" stroke-width="5" stroke-linecap="round"/>

  <!-- Centre cap -->
  <circle cx="256" cy="256" r="19" fill="#06b6d4"/>
  <circle cx="256" cy="256" r="8"  fill="#030712"/>
</svg>
