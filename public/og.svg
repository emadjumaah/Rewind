<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="78%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ogSand"><circle cx="50" cy="50" r="36"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="#030712"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Big faded mark, lower-right -->
  <g transform="translate(815,300) scale(3.4)" opacity="0.16">
    <g clip-path="url(#ogSand)">
      <rect x="14" y="41.36" width="72" height="45" fill="#2dd4bf" fill-opacity="0.5"/>
      <rect x="14" y="41.36" width="72" height="0.9" fill="#2dd4bf"/>
    </g>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2.6"/>
    <path d="M 50.00 10.00 A 40 40 0 1 0 77.38 79.16" fill="none" stroke="#2dd4bf" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="42" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.3"/>
    <line x1="50" y1="50" x2="34" y2="32" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="69" y2="34" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- Brand mark badge, top-left -->
  <g transform="translate(90,58) scale(0.62)">
    <g clip-path="url(#ogSand)">
      <rect x="14" y="41.36" width="72" height="45" fill="#2dd4bf" fill-opacity="0.2"/>
      <rect x="14" y="41.36" width="72" height="0.9" fill="#2dd4bf" fill-opacity="0.65"/>
    </g>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2.6"/>
    <path d="M 50.00 10.00 A 40 40 0 1 0 77.38 79.16" fill="none" stroke="#2dd4bf" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="42" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.3"/>
    <line x1="50" y1="50" x2="34" y2="32" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3.6" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="69" y2="34" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="39" y2="73" stroke="#2dd4bf" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="4" fill="#2dd4bf"/>
  </g>
  <text x="158" y="108" font-family="'Courier New', monospace" font-size="30" font-weight="600" fill="#ffffff" fill-opacity="0.5" letter-spacing="6">REWIND</text>

  <text x="86" y="320" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="800" fill="#ffffff">Time, honestly.</text>
  <text x="90" y="400" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="600" fill="#2dd4bf">It only runs out.</text>
  <text x="90" y="470" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#ffffff" fill-opacity="0.62">A backward clock and an honest look at the time you have left.</text>
  <text x="90" y="580" font-family="'Courier New', monospace" font-size="26" fill="#ffffff" fill-opacity="0.35">rewind.uts.qa</text>
</svg>
